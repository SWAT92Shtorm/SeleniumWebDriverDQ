<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Запись на баскетбол в Ярославле</title>
  <style>
  body {
    font-family: sans-serif;
    max-width: 600px;
    margin: 20px auto;
    margin-bottom: 40px;

    background-color: #121212;   /* тёмный фон страницы */
    color: #e0e0e0;              /* светлый текст */
  }

  label, input, button, select {
    margin: 5px 0;
    padding: 10px;
    width: 100%;
    border-radius: 4px;
    border: 1px solid #404040;
    box-sizing: border-box;
    font-size: 16px;

    background-color: #2d2d2d;
    color: #f0f0f0;
  }

  #nameInput {
  color: black;
  }

  input:focus, select:focus {
    border-color: #00aaff;
    outline: none;
  }

  button {
    background-color: #007acc;
    color: #ffffff;
    border: none;
    cursor: pointer;
  }

  button:hover {
    background-color: #005ca3;
  }

  .players {
    margin-top: 20px;
    padding: 10px;
    background: #252525;
    border-radius: 5px;
    border: 1px solid #404040;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    background-color: #222222;
  }

  th, td {
    padding: 8px;
    text-align: left;
    border: 1px solid #404040;
    color: #e0e0e0;
  }

  th {
    background: #333333;
  }

  #currentDateTime {
    margin-bottom: 15px;
    padding: 10px;
    background: #202020;
    border-radius: 5px;
    font-size: 14px;
    color: #d0ffd0;
    border: 1px solid #404040;
  }

  #nearestGameInfo {
    margin-top: 10px;
    padding: 10px;
    background: #202020;
    border-radius: 5px;
    font-size: 14px;
    color: #a0e0ff;        /* светло‑голубой текст */
    border: 1px solid #404040;
  }

  #hallSelectRow {
    margin-bottom: 10px;
  }

  #hallSelectRow > * {
    display: block;
    margin: 2px 0;
  }

  #pricingRow {
    margin-top: 15px;
    padding: 8px;
    background: #1a4b1a;
    border-radius: 4px;
    font-size: 14px;
    color: #e0ffe0;
  }

  .playerLine {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 5px 0;
    border-bottom: 1px solid #303030;
    padding-bottom: 4px;
  }

  .playerName {
    flex-grow: 1;
    margin-right: 10px;
    color: #ffffff;
  }

  .playerName span {
    margin-right: 10px;
  }

  .icons {
    white-space: nowrap;
    text-align: right;
  }

  .responsible {
    margin-top: 4px;
    margin-bottom: 8px;
    font-size: 13px;
    color: #a0ffa0;
  }
</style>

</head>
<body>

  <!-- Время вверху -->
  <div id="currentDateTime">
    Загрузка... дата и время
  </div>

  <h1>Запись на баскетбол в Ярославле</h1>

  <div id="hallSelectRow">
    <label>Выбери зал:</label>
    <select id="hallSelect">
      <option value="">Выберите зал</option>
      <option value="hall1">ЛОКОМОТИВ [Отв. Андрей Дубровин]</option>
      <option value="hall2">АТЛАНТ [Отв. Ярослав Волков]</option>
    </select>
  </div>

  <div id="nearestGameInfo">
    Ближайшая игра: не выбран зал
  </div>

   <br> <br>

  <label>Введи или выбери ФИО:</label><br />
  <input type="text" id="playerName" placeholder="Иван Иванович Иванов" list="playersList" />
  <span id="playerNameError" style="color: red; font-size: 12px; display: none;">
    ФИО должно состоять из трёх слов: Фамилия Имя Отчество
  </span>

  <datalist id="playersList"></datalist>

  <button
    onclick="addPlayer()"
    style="margin-bottom: 24px;">
    Записаться
  </button>

  <div id="result"></div>

    <!-- Строка расчёта суммы -->
  <div id="pricingRow">
    Стоимость к оплате: не выбран зал.
  </div>

  <!-- Блок подтверждения игры (скрывается/показывается по логике >10 человек) -->
  <div id="confirmGameBlock" style="margin-top: 12px; padding: 8px; border-radius: 4px; background: #252525; border: 1px solid #404040; display: none;">
    <button onclick="confirmGame()">
      Игра состоялась
    </button>
  </div>

  <!-- График игр (скрытый по умолчанию) -->
  <div id="scheduleContainer" style="margin-top: 20px; display: none;">
    <h2>График игр в выбранном зале</h2>
    <div id="scheduleContent"></div>
  </div>

    <!-- Блок таблицы истории записей по датам (прямо после списка участников) -->
  <div id="historyTableContainer" style="margin-top: 12px; display: none;"></div>


  <button onclick="clearHallPlayers()" style="background:#b22222;margin-top:10px;">
  Очистить список участников
  </button>
  

  <script>

    const MAX_PLAYERS = 18;

    // Стоимость для залов (если больше 500, считаем деление)
    const hallPrice = {
      "hall1": 4500,
      "hall2": 350
    };

    // Телефоны ответственных
    const hallPhone = {
      hall1: "+7 (961) 154-44-11",   // Андрей Дубровин
      hall2: "+7 (980) 747-20-39"    // Ярослав Волков
    };

    let playersByHall = { hall1: [], hall2: [] };
    let playerNames = [];  
    let historyByDate = {};

// Копировать телефон в буфер (без alert)
    async function copyPhoneToClipboard(phone) {
      try {
        await navigator.clipboard.writeText(phone);
        // можно оставить небольшую подсказку в консоли или скрытом тултипе
      } catch (err) {
        console.error('Не удалось скопировать телефон:', err);
      }
    }

    function clearHallPlayers() {
      const hall = document.getElementById('hallSelect').value;
      if (!hall) {
        alert('Сначала выбери зал.');
        return;
      }

      const hallName = hall === 'hall1' ? 'ЛОКОМОТИВ' : 'АТЛАНТ';
      if (!confirm(`Очистить весь список зала ${hallName}?`)) return;

      playersByHall[hall] = [];
      localStorage.setItem('basketballPlayersByHall', JSON.stringify(playersByHall));

      showList();
    }

    // ========== Загрузка данных из JSON-файла ==========

 async function loadFromAPI() {
  try {
    const response = await fetch('https://seleniumwebdriverdq-production.up.railway.app/api/players');
    if (!response.ok) throw new Error('Не удалось загрузить участников');
    const data = await response.json();

    playersByHall = data.playersByHall || { hall1: [], hall2: [] };
    historyByDate = data.historyByDate || {};

    // === собрать всеИмена из серверного JSON в playerNames
    const allNames = new Set();
    Object.values(playersByHall).forEach(hallPlayers => {
      hallPlayers.forEach(name => {
        if (name) allNames.add(name);
      });
    });
    playerNames = Array.from(allNames);

  } catch (err) {
    console.error('Ошибка при запросе API:', err);
    playersByHall = { hall1: [], hall2: [] };
    historyByDate = {};
    playerNames = [];
  }

  // после загрузки обновляем отображение списка
  showList();
  updatePlayersList();   // ✅ вот сюда
}


    // Показать текущие дата и время
    function showCurrentDateTime() {
      const now = new Date();
      const options = {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      };
      const dtText = now.toLocaleString('ru-RU', options)
        .replace(',', '')
        .replace('г.', 'г.');
      document.getElementById('currentDateTime').textContent =
        'Сегодня: ' + dtText;
    }

    function saveHistory() {
      localStorage.setItem('basketballHistoryByDate', JSON.stringify(historyByDate));
    }

        // Показать историю записей в виде таблицы под списком участников
         function showHistoryTable() {
      const hall = document.getElementById('hallSelect').value;
      const histName = hall === 'hall1' ? 'ЛОКОМОТИВ' : 'АТЛАНТ';

      const historyTableContainer = document.getElementById('historyTableContainer');
      historyTableContainer.innerHTML = '';
      historyTableContainer.style.display = 'none';

      if (!hall) {
        return;
      }

      const entries = [];

      Object.keys(historyByDate).forEach(dateStr => {
        const hallData = historyByDate[dateStr][hall] || [];
        if (hallData.length > 0) {
          entries.push({
            date: dateStr,
            players: hallData
          });
        }
      });

      if (entries.length === 0) {
        return;
      }

      historyTableContainer.style.display = 'block';

      // сортируем так, чтобы самая свежая дата была первой
      // '2026-04-19' > '2026-04-18' → в JavaScript это работает правильно
      entries.sort((a, b) => {
        if (a.date < b.date) return 1;   // a старше — ниже
        if (a.date > b.date) return -1;  // a свежее — выше
        return 0;
      });

      let rows = entries.map(entry => {
        const dateStr = entry.date;
        const players = entry.players;

        return `
          <tr>
            <td style="
              white-space: nowrap;
              padding: 6px;
              border: 1px solid #404040;
              color: #e0e0e0;
              font-size: 12px;">
              ${dateStr}
            </td>
            <td style="
              padding: 6px;
              border: 1px solid #404040;
              color: #e0e0e0;
              font-size: 12px;">
              ${players.join(', ')}
            </td>
          </tr>
        `;
      }).join('');

      historyTableContainer.innerHTML = `
        <h3 style="color: #a0e0ff; margin-top: 10px;">История записей в зале ${histName} по датам</h3>
        <table style="
          width: 100%;
          border-collapse: collapse;
          margin-top: 6px;
          background: #222;
          table-layout: fixed;">
          <thead>
            <tr style="background: #333;">
              <th style="
                width: 15%;
                padding: 6px;
                border: 1px solid #404040;
                color: #ffffff;
                text-align: left;
                font-size: 13px;">
                Дата
              </th>
              <th style="
                width: 85%;
                padding: 6px;
                border: 1px solid #404040;
                color: #ffffff;
                text-align: left;
                font-size: 13px;">
                Участники
              </th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }

      // Подтвердить игру и сохранить текущий список в историю ближайшей даты
    async function confirmGame() {
      const hall = document.getElementById('hallSelect').value;
      const players = playersByHall[hall] || [];

      if (!hall) {
        alert('Сначала выберите зал.');
        return;
      }

      if (players.length === 0) {
        alert('Список игроков пуст.');
        return;
      }

      const dateStr = getNearestGameDate(hall);

      if (!dateStr) {
        alert('Не удалось определить ближайшую дату игры.');
        return;
      }

      // 1. Сохраняем историю игры (как раньше)
      try {
        const historyResponse = await fetch(
          'https://seleniumwebdriverdq-production.up.railway.app/api/games/confirm',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              hallId: hall,
              date: dateStr,
              players: players
            })
          }
        );

        if (!historyResponse.ok) {
          throw new Error('Ошибка при подтверждении игры');
        }

        const historyResult = await historyResponse.json();
        historyByDate = historyResult.historyByDate || {};

        // 2. Очищаем всех участников в этом зале через новый API
        const clearResponse = await fetch(
          `https://seleniumwebdriverdq-production.up.railway.app/api/players/all/${hall}`,
          {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' }
          }
        );

        if (!clearResponse.ok) {
          throw new Error('Ошибка при очистке списка участников');
        }

        const clearResult = await clearResponse.json();
        playersByHall = clearResult.playersByHall || playersByHall;

        // Обновляем DOM
        showList();
        showHistoryTable();

        const gameText = getNearestGameText(hall).replace('Ближайшая игра: ', '');

        alert(
          `Игра в зале "${
            hall === 'hall1' ? 'ЛОКОМОТИВ' : 'АТЛАНТ'
          }" на дату ${dateStr} (${gameText}) подтверждена, история сохранена и список участников очищен.`
        );
      } catch (err) {
        console.error('Ошибка при подтверждении игры или очистке списка:', err);
        alert('Не удалось сохранить историю игры или очистить список участников через API');
      }
    }


    // Показать список участников с inline-редактированием и подсчётом суммы
    function showList() {
      const hall = document.getElementById('hallSelect').value;
      const result = document.getElementById('result');
      const priceElem = document.getElementById('pricingRow');
      const players = playersByHall[hall] || [];

      const currentPlayers = players.length;

      // === показать/скрыть кнопку при >10 человек ===
      const confirmBlock = document.getElementById('confirmGameBlock');
      if (confirmBlock) {
        if (currentPlayers > 9) {
          confirmBlock.style.display = 'block';
        } else {
          confirmBlock.style.display = 'none';
        }
      }


      // Вывод списка
      if (!hall) {
        result.innerHTML = '<p>Выберите зал, чтобы увидеть список участников.</p>';
        priceElem.textContent = 'Стоимость к оплате: не выбран зал.';
        return;
      }

      // Выбранный зал и ответственный перед списком
      const sel = document.getElementById('hallSelect');
      const hallText = sel.options[sel.selectedIndex].text;

      const parts = hallText.split(' [Отв. ');
      const hallName = parts[0];
      const resp = parts[1] ? parts[1].replace(']', '') : '';

      result.innerHTML = `
        <div style="
          font-size: 20px;
          font-weight: 600;
          color: #ffffff;
          margin-bottom: 14px;
          padding-bottom: 6px;
          border-bottom: 1px solid #404040;">
          Все записавшиеся в <span style="color: #a0e0ff;">${hallName}</span>
        </div>
        ${resp ? `
          <div style="
            font-size: 13px;
            margin-bottom: 14px;
            color: #b0ffa0;">
            Ответственный: ${resp}
          </div>
        ` : ''}
      `;


      if (players.length === 0) {
        result.innerHTML += '<p>Список пока пуст.</p>';
      } else {
        const list = players.map((name, i) => {
          const idx = i + 1;
          const isLimited = idx <= MAX_PLAYERS;
          const colorStyle = isLimited ? '' : 'color: red;';
          const nameStyle = isLimited ? '' : 'color: red;';
          return `
            <div class="playerLine" id="playerLine${i}" style="${nameStyle}">
            <div class="playerName">
              <span style="${nameStyle}">${idx}. ${name}</span>
              <input type="text" id="nameEdit${i}" value="${name}" style="display: none; width: 250px; padding: 2px;" />
            </div>
              <div class="icons">
                <span onclick="startEdit(${i})" style="cursor: pointer; margin-right: 6px;">✎</span>
                <span onclick="submitEdit(${i})" style="display: none; cursor: pointer; margin-right: 6px; color: green;">✔</span>
                <span onclick="cancelEdit(${i})" style="display: none; cursor: pointer; margin-right: 6px; color: gray;">✖</span>
                <span onclick="removePlayer(${i})" style="cursor: pointer; color: red;">🗑️</span>
              </div>
            </div>
          `;
        }).join('');
        result.innerHTML += list;
      }

      // === Индикатор заполненности ===
      const activeCount = Math.min(MAX_PLAYERS, players.length);
      const perc = Math.min(100, (players.length / MAX_PLAYERS) * 100);
      const barColor = players.length < 10 ? '#c62828' : '#2e7d32';   // < 10 — красный, ≥10 — зелёный

      result.innerHTML += `
        <div style="margin-top: 12px; font-size: 13px; color: #b0b0b0;">
          Заполненность:
          <span style="color: #ffffff;">
            ${players.length} / ${MAX_PLAYERS} человек
          </span>
          <div style="margin-top: 4px; height: 8px; background: #444; border-radius: 4px; overflow: hidden;">
            <div style="
              height: 100%;
              width: ${perc}%;
              background: ${barColor};
              border-radius: 4px;
              transition: width 0.3s ease;">
            </div>
          </div>
        </div>
      `;


      // Подсчёт и отображение суммы к оплате на человека
      const hallKey = hall;
      const price = hallPrice[hallKey] || 0;

      if (price > 500 && players.length > 0) {
        const activeCount = Math.min(MAX_PLAYERS, players.length);
        const perPerson = (price / activeCount).toFixed(2);
        const isUnder10 = players.length < 10;
        const mainBg = isUnder10 ? '#501010' : '#1a4b1a';   // фон #pricingRow
        const borderCol = isUnder10 ? '#a03030' : '#006633'; // рамка #pricingRow
        const phoneBg = isUnder10 ? '#501010' : '#224422';   // фон блока с телефоном

        const priceElem = document.getElementById('pricingRow');
        priceElem.style.background = mainBg;
        priceElem.style.borderColor = borderCol;

        priceElem.innerHTML = `
          <div style="font-size: 13px; margin-bottom: 4px;">
            Стоимость зала: ${price} ₽
          </div>
          <div style="font-size: 13px;">
            Оплачивать будут ${activeCount} человек (${activeCount} в пределах лимита)
          </div>
          <div style="font-size: 13px; margin-top: 4px;">
            <strong>Каждому нужно заплатить: ${perPerson} ₽</strong>
          </div>

          <div style="
            margin-top: 10px;
            padding: 8px 10px;
            background: ${phoneBg};
            border-radius: 4px;
            border: 1px solid #336633;
            font-size: 13px;
            color: #e0ffe0;">
            Для оплаты переведите деньги на телефон:
            <br />
            <span style="color: #ffffff; font-weight: bold; margin: 0 4px;" id="displayPhone">${hallPhone[hall]}</span>
            <button
              onclick="copyPhoneToClipboard('${hallPhone[hall]}')"
              style="
                margin-left: 6px;
                padding: 0;
                width: 20px;
                height: 20px;
                border: none;
                background: transparent;
                color: #a0e0ff;
                font-size: 15px;
                cursor: pointer;"
              title="Копировать телефон">
              📋
            </button>
          </div>
        `;
      } else {
        const priceElem = document.getElementById('pricingRow');
        priceElem.style.background = '#1a4b1a';
        priceElem.style.borderColor = '#404040';
        priceElem.innerHTML = `
          Стоимость зала: ${price} ₽.<br>
          Для этого зала не производится деление на участников или участников нет.
        `;
      }

      showHistoryTable(); 

    }

    // Начать редактирование (показать инпут)
    function startEdit(index) {
      const line = document.getElementById(`playerLine${index}`);
      const span = document.querySelector(`#playerLine${index} .playerName span`);
      const input = document.getElementById(`nameEdit${index}`);

      const startIcon = document.querySelector(`span[onclick="startEdit(${index})"]`);
      const submitIcon = document.querySelector(`span[onclick="submitEdit(${index})"]`);
      const cancelIcon = document.querySelector(`span[onclick="cancelEdit(${index})"]`);

      span.style.display = 'none';
      input.style.display = 'inline-block';
      input.focus();

      startIcon.style.display = 'none';
      submitIcon.style.display = 'inline-block';
      cancelIcon.style.display = 'inline-block';
    }

    // Сохранить редактирование
    async function submitEdit(index) {
      const input = document.getElementById(`nameEdit${index}`);
      const newValue = input.value.trim();
      if (!newValue) return;

      const hall = document.getElementById('hallSelect').value;
      const oldName = playersByHall[hall][index];

      // Отправляем PATCH в API
      try {
        const response = await fetch(
          `https://seleniumwebdriverdq-production.up.railway.app/api/players/${hall}/${index}`,
          {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newValue })
          }
        );

        if (!response.ok) {
          throw new Error('Ошибка при редактировании игрока');
        }

        const result = await response.json();
        playersByHall = result.playersByHall || playersByHall;

        // Обновить список ФИО
        const idxInNames = playerNames.indexOf(oldName);
        if (idxInNames !== -1) {
          playerNames[idxInNames] = newValue;
        }

        localStorage.setItem('basketballPlayerNames', JSON.stringify(playerNames));
        localStorage.setItem('basketballPlayersByHall', JSON.stringify(playersByHall));

        showList();
      } catch (err) {
        console.error('Ошибка при редактировании через API:', err);
        alert('Не удалось отредактировать игрока через API');
      }
    }



    // Отменить редактирование
    function cancelEdit(index) {
      showList();
    }

    // Удалить участника
    async function removePlayer(index) {
      const hall = document.getElementById('hallSelect').value;
      const name = playersByHall[hall][index];

      if (!confirm(`Удалить "${name}" через API?`)) return;

      // Отправляем DELETE в API
      try {
        const response = await fetch(
          `https://seleniumwebdriverdq-production.up.railway.app/api/players/${hall}/${index}`,
          {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' }
          }
        );

        if (!response.ok) {
          throw new Error('Ошибка при удалении игрока');
        }

        const result = await response.json();
        playersByHall = result.playersByHall || playersByHall;

        // Удаляем из списка имён, если есть
        const idxInNames = playerNames.indexOf(name);
        if (idxInNames !== -1) {
          playerNames.splice(idxInNames, 1);
        }

        localStorage.setItem('basketballPlayerNames', JSON.stringify(playerNames));
        localStorage.setItem('basketballPlayersByHall', JSON.stringify(playersByHall));

        showList();
      } catch (err) {
        console.error('Ошибка при удалении через API:', err);
        alert('Не удалось удалить игрока через API');
      }
    }


    function validatePlayerName() {
      const input = document.getElementById('playerName');
      const error = document.getElementById('playerNameError');
      const name = input.value.trim();
      const words = name.split(/\s+/).filter(word => word.length > 0);

      if (!name || words.length < 3) {
        input.style.borderColor = '#ffb347';
        input.style.backgroundColor = '#fff3e0';
        input.style.color = '#2b2b2b';
        error.style.display = 'block';
      } else {
        input.style.borderColor = '#ccc';
        input.style.backgroundColor = 'white';
        input.style.color = '#000000';
        error.style.display = 'none';
      }
    }

    async function addPlayer() {
      const input = document.getElementById('playerName');
      const error = document.getElementById('playerNameError');
      const name = input.value.trim();
      const words = name.split(/\s+/).filter(word => word.length > 0);

      if (!name || words.length < 3) {
        validatePlayerName();
        return;
      }

      const hall = document.getElementById('hallSelect').value;

      if (!hall) {
        alert('Сначала выберите зал');
        return;
      }

      // Если массива для зала нет — создаём
      if (!playersByHall[hall]) {
        playersByHall[hall] = [];
      }

      // Отправляем в API
      try {
        const response = await fetch(
          `https://seleniumwebdriverdq-production.up.railway.app/api/players/${hall}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
          }
        );

        if (!response.ok) {
          throw new Error('Ошибка при добавлении игрока');
        }

        const result = await response.json();
        playersByHall = result.playersByHall || playersByHall;

        // Обновляем список имён
        if (!playerNames.includes(name)) {
          playerNames.push(name);
        }

        // Сохраняем в localStorage, если нужно
        localStorage.setItem('basketballPlayerNames', JSON.stringify(playerNames));
        localStorage.setItem('basketballPlayersByHall', JSON.stringify(playersByHall));

        input.value = '';
        input.style.borderColor = '#ccc';
        input.style.backgroundColor = 'white';
        error.style.display = 'none';
        showList();
        updatePlayersList();
      } catch (err) {
        console.error('Ошибка при добавлении через API:', err);
        alert('Не удалось добавить игрока через API');
      }
    }


    function updatePlayersList() {
      const list = document.getElementById('playersList');
      list.innerHTML = ''; // очищаем

      playerNames.forEach(name => {
        const option = document.createElement('option');
        option.value = name;
        list.appendChild(option);
      });
    }

    // ===============================
    // Ближайшая встреча: дата + день недели
    // ===============================

    const dayNamesRU = {
      "Monday": "понедельник",
      "Tuesday": "вторник",
      "Wednesday": "среда",
      "Thursday": "четверг",
      "Friday": "пятница",
      "Saturday": "суббота",
      "Sunday": "воскресенье"
    };

    const scheduleDefs = [
      { hall: "hall1", day: "Tuesday",  from: 21, to: 23 },
      { hall: "hall1", day: "Thursday", from: 21, to: 23 },
      { hall: "hall2", day: "Friday",   from: 21, to: 23 }
    ];

    function getDayCode(dayName) {
      const map = {
        "Monday": 1,
        "Tuesday": 2,
        "Wednesday": 3,
        "Thursday": 4,
        "Friday": 5,
        "Saturday": 6,
        "Sunday": 7
      };
      return map[dayName] || 0;
    }

    function getNearestGameDate(hall) {
      const now = new Date();
      const nowWeekDay = now.getDay() || 7;
      const nowHour = now.getHours();

      let nearest = null;

      scheduleDefs
        .filter(item => item.hall === hall)
        .forEach(item => {
          const dayCode = getDayCode(item.day);
          const dayDiff = (dayCode - nowWeekDay + 7) % 7;
          const approximateHour = item.from;
          let timeDiff = dayDiff * 24 + (approximateHour - nowHour);

          if (timeDiff < 0) {
            timeDiff += 7 * 24;
          }

          if (!nearest || timeDiff < nearest.diff) {
            nearest = {
              diff: timeDiff,
              from: item.from,
              to: item.to
            };
          }
        });

      if (!nearest) return null;

      const nearestDate = new Date(now);
      nearestDate.setDate(now.getDate() + Math.floor(nearest.diff / 24));
      nearestDate.setHours(nearest.from, 0, 0, 0);

      return nearestDate.toISOString().split('T')[0];  // YYYY-MM-DD
    }


    function getNearestGameText(hall) {
      const now = new Date();
      const nowWeekDay = now.getDay() || 7;
      const nowHour = now.getHours();

      let nearest = null;

      scheduleDefs
        .filter(item => item.hall === hall)
        .forEach(item => {
          const dayCode = getDayCode(item.day);
          const dayDiff = (dayCode - nowWeekDay + 7) % 7;
          const approximateHour = item.from;
          let timeDiff = dayDiff * 24 + (approximateHour - nowHour);

          if (timeDiff < 0) {
            timeDiff += 7 * 24;
          }

          if (!nearest || timeDiff < nearest.diff) {
            nearest = {
              diff: timeDiff,
              day: item.day,
              from: item.from,
              to: item.to
            };
          }
        });

      if (!nearest) {
        return "Ближайшая игра: не найдено";
      }

      const russianDay = dayNamesRU[nearest.day];

      const nearestDate = new Date(now);
      nearestDate.setDate(now.getDate() + Math.floor(nearest.diff / 24));
      nearestDate.setHours(nearest.from, 0, 0, 0);

      const dateOptions = {
        day: 'numeric',
        month: 'short',
        weekday: 'short'
      };
      const parts = nearestDate.toLocaleString('ru-RU', dateOptions).split(' ');
      const dayNum = parts[1];
      const month = parts[2].replace('.', '');
      const weekday = parts[0].replace(',', '').charAt(0).toUpperCase() + parts[0].slice(1, -1);

      const fromStr = `${nearest.from}:00`;
      const toStr = `${nearest.to}:00`;

      return `Ближайшая игра: ${weekday}, ${dayNum} ${month}, ${fromStr}–${toStr}`;
    }

    function showNearestGame() {
      const hall = document.getElementById('hallSelect').value;
      const info = document.getElementById('nearestGameInfo');

      if (!hall) {
        info.textContent = "Ближайшая игра: не выбран зал";
        return;
      }

      info.textContent = getNearestGameText(hall);
    }

    document.getElementById('hallSelect').addEventListener('change', showNearestGame);
    
        // выбрать ближайший зал как значение по умолчанию
    function selectNearestHall() {
      const now = new Date();
      const nowWeekDay = now.getDay() || 7;
      const nowHour = now.getHours();

      let nearest = null;

      scheduleDefs.forEach(item => {
        const dayCode = getDayCode(item.day);
        const dayDiff = (dayCode - nowWeekDay + 7) % 7;
        const approximateHour = item.from;
        let timeDiff = dayDiff * 24 + (approximateHour - nowHour);

        if (timeDiff < 0) {
          timeDiff += 7 * 24;
        }

        if (!nearest || timeDiff < nearest.diff) {
          nearest = { diff: timeDiff, hall: item.hall };
        }
      });

      if (nearest) {
        document.getElementById('hallSelect').value = nearest.hall;
      }
    }

window.addEventListener("DOMContentLoaded", async function () {
