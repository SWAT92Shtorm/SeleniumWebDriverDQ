/* смайлик одобрения */

  margin-bottom: 0;
}

@keyframes bounceSmile {
  0%   { transform: translateY(-10px) rotate(0deg); }
  25%  { transform: translateY(-20px) rotate(5deg); }   /* чуть меньше прыжка */
  50%  { transform: translateY(-10px) rotate(-5deg); }
  75%  { transform: translateY(-5px) rotate(3deg); }   /* чуть меньше последнего подъёма */
  100% { transform: translateY(-10px) rotate(0deg); }
}

  async function loadFromAPI() {
    try {
      // 1. Игроки и текущий playersByHall
      const response = await fetch(
        'https://ball76.up.railway.app/api/players'
      );

      if (!response.ok) throw new Error('Не удалось загрузить участников');

      const data = await response.json();

      playersByHall = data.playersByHall || { hall1: [], hall2: [] };



      // 2. НОВЫЙ БЛОК: история записей из базы (все игры)
      const historyResponse = await fetch(
        'https://ball76.up.railway.app/api/history'
      );

      if (!historyResponse.ok) throw new Error('Не удалось загрузить историю');

      const historyData = await historyResponse.json();
      historyByDate = historyData.historyByDate || {};



      // 3. Собрать playerNames из базы (игроки + истории)
      const allNames = new Set();
      Object.values(playersByHall).forEach(hallPlayers => {
        hallPlayers.forEach(name => {
          if (name) allNames.add(name);
        });
      });

      Object.keys(historyByDate).forEach(dateStr => {
        const dateData = historyByDate[dateStr];
        for (const hallId in dateData) {
          const players = dateData[hallId] || [];
          players.forEach(name => {
            if (name) allNames.add(name.trim());
          });
        }
      });

      playerNames = Array.from(allNames);
    } catch (err) {
      console.error('Ошибка при запросе API:', err);
      playersByHall = { hall1: [], hall2: [] };
      historyByDate = {};
      playerNames = [];
    }

    updatePlayersList();
    showList();
  }



    // Показать текущие дата и время
    function showCurrentDateTime() {
      const now = new Date();
      const options = {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      };
      const dtText = now.toLocaleString('ru-RU', options)
        .replace(',', '')
        .replace('г.', 'г.');
      document.getElementById('currentDateTime').textContent =
        'Сегодня: ' + dtText;
    }

    function saveHistory() {
      localStorage.setItem('basketballHistoryByDate', JSON.stringify(historyByDate));
    }

    // ФИО из истории
    function collectAllNamesFromHistory() {
      const allNames = new Set();

      // из playerNames
      playerNames.forEach(name => {
        if (name) allNames.add(name.trim());
      });

      // из historyByDate[hall1] и historyByDate[hall2]
      for (const dateStr in historyByDate) {
        const dateData = historyByDate[dateStr];
        for (const hallId in dateData) {
          const players = dateData[hallId] || [];
          players.forEach(name => {
            if (name) allNames.add(name.trim());
          });
        }
      }

      return Array.from(allNames);
    }

    // Показать историю записей в виде таблицы под списком участников
    function showHistoryTable() {
      const hall = document.getElementById('hallSelect').value;
      const histName = hall === 'hall1' ? 'ЛОКОМОТИВ' : 'АТЛАНТ';

      const historyTableContainer = document.getElementById('historyTableContainer');
      historyTableContainer.innerHTML = '';
      historyTableContainer.style.display = 'none';

      if (!hall) {
        return;
      }

      // собрать записи только для этого зала: { date: "2026-04-19", players: [...] }
      const entries = [];

      Object.keys(historyByDate).forEach(dateStr => {
        const hallData = historyByDate[dateStr][hall] || [];
        if (hallData.length > 0) {
          entries.push({
            date: dateStr,
            players: hallData
          });
        }
      });

      if (entries.length === 0) {
        return;
      }

      historyTableContainer.style.display = 'block';

      // сортируем по дате: свежие сверху
      entries.sort((a, b) => {
        if (a.date < b.date) return 1;
        if (a.date > b.date) return -1;
        return 0;
      });

      // формируем блочную «карточку» для каждой даты (как в расписании)
      let html = `
        <h3 style="
          color: #a0e0ff;
          margin-top: 14px;
          margin-bottom: 8px;
          font-size: 16px;">
          История записей в зале ${histName} по датам
        </h3>

        <div style="
          display: flex;
          flex-direction: column;
          gap: 10px;">
      `;

      entries.forEach(entry => {
        const dateStr = entry.date;
        const players = entry.players;

        html += `
          <div style="
            padding: 10px;
            border-radius: 4px;
            background: #222;
            border: 1px solid #404040;
            font-size: 13px;
            color: #e0e0e0;">

            <div style="
              font-weight: 600;
              color: #a0e0ff;
              margin-bottom: 4px;">
              ${dateStr}
            </div>

            <div style="
              line-height: 1.5;">
              ${players.join(', ')}
            </div>
          </div>
        `;
      });

      html += '</div>';

      historyTableContainer.innerHTML = html;
    }

    // Показать список участников с inline-редактированием и подсчётом суммы
    function showList() {
      const hall = document.getElementById('hallSelect').value;
      const result = document.getElementById('result');
      const priceElem = document.getElementById('pricingRow');
      const players = playersByHall[hall] || [];

      const currentPlayers = players.length;

      // Вывод списка
      if (!hall) {
        result.innerHTML = '<p>Выберите зал, чтобы увидеть список участников.</p>';
        priceElem.textContent = 'Стоимость к оплате: не выбран зал.';
        return;
      }

      // Выбранный зал и ответственный перед списком
      const sel = document.getElementById('hallSelect');
      const hallText = sel.options[sel.selectedIndex].text;

      const parts = hallText.split(' [Отв. ');
      const hallName = parts[0];
      const resp = parts[1] ? parts[1].replace(']', '') : '';

      result.innerHTML = `
        <div style="
          font-size: 20px;
          font-weight: 600;
          color: #ffffff;
          margin-bottom: 14px;
          padding-bottom: 6px;
          border-bottom: 1px solid #404040;">
          Все записавшиеся в <span style="color: #a0e0ff;">${hallName}</span>
        </div>
        ${resp ? `
          <div style="
            font-size: 13px;
            margin-bottom: 14px;
            color: #b0ffa0;">
            Ответственный: ${resp}
          </div>
        ` : ''}
      `;


      if (players.length === 0) {
        result.innerHTML += '<p>Список пока пуст.</p>';
      } else {
        const list = players.map((name, i) => {
          const idx = i + 1;
          const isLimited = idx <= MAX_PLAYERS;
          const colorStyle = isLimited ? '' : 'color: red;';
          const nameStyle = isLimited ? '' : 'color: red;';
          return `
            <div class="playerLine" id="playerLine${i}" style="${nameStyle}">
            <div class="playerName">
              <span style="${nameStyle}">${idx}. ${name}</span>
              <input type="text" id="nameEdit${i}" value="${name}" style="display: none; width: 250px; padding: 2px;" />
            </div>
              <div class="icons">
                <span onclick="startEdit(${i})" style="cursor: pointer; margin-right: 6px;">✎</span>
                <span onclick="submitEdit(${i})" style="display: none; cursor: pointer; margin-right: 6px; color: green;">✔</span>
                <span onclick="cancelEdit(${i})" style="display: none; cursor: pointer; margin-right: 6px; color: gray;">✖</span>
                <span onclick="removePlayer(${i})" style="cursor: pointer; color: red;">🗑️</span>
              </div>
            </div>
          `;
        }).join('');
        result.innerHTML += list;
      }

      // === Индикатор заполненности ===
      const activeCount = Math.min(MAX_PLAYERS, players.length);
      const perc = Math.min(100, (players.length / MAX_PLAYERS) * 100);
      const barColor = players.length < 10 ? '#c62828' : '#2e7d32';   // < 10 — красный, ≥10 — зелёный

      result.innerHTML += `
        <div style="margin-top: 12px; font-size: 13px; color: #b0b0b0;">
          Заполненность:
          <span style="color: #ffffff;">
            ${players.length} / ${MAX_PLAYERS} человек
          </span>
          <div style="margin-top: 4px; height: 8px; background: #444; border-radius: 4px; overflow: hidden;">
            <div style="
              height: 100%;
              width: ${perc}%;
              background: ${barColor};
              border-radius: 4px;
              transition: width 0.3s ease;">
            </div>
          </div>
        </div>
      `;


      // Подсчёт и отображение суммы к оплате на человека
      const hallKey = hall;
      //const price = hallPrice[hallKey] || 0;

      const durationSelect = document.getElementById('durationSelect');
      const durationKey = durationSelect ? durationSelect.value : 'full';   // по умолчанию 2 часа
      const price = hallPriceByDuration[hall]?.[durationKey] || hallPrice[hall] || 0;
      const durationText = durationKey === 'full' ? '2 часа' : durationKey === 'short' ? '1 час 30 мин' : '';

      if (price > 500 && players.length > 0) {
        const activeCount = Math.min(MAX_PLAYERS, players.length);
        const perPerson = (price / activeCount).toFixed(2);
        const isUnder10 = players.length < 10;
        const mainBg = isUnder10 ? '#501010' : '#1a4b1a';   // фон #pricingRow
        const borderCol = isUnder10 ? '#a03030' : '#006633'; // рамка #pricingRow
        const phoneBg = isUnder10 ? '#501010' : '#224422';   // фон блока с телефоном

        const priceElem = document.getElementById('pricingRow');
        priceElem.style.background = mainBg;
        priceElem.style.borderColor = borderCol;

        priceElem.innerHTML = `
          <div style="font-size: 13px; margin-bottom: 4px;">
            Стоимость зала: ${price} ₽
          </div>
          <div style="font-size: 13px; margin-bottom: 4px;">
            Время аренды: ${durationText}
          </div>
          <div style="font-size: 13px;">
            Оплачивать будут ${activeCount} человек (${activeCount} в пределах лимита)
          </div>
          <div style="font-size: 13px; margin-top: 4px;">
            <strong>Каждому нужно заплатить: ${perPerson} ₽</strong>
          </div>

          <div style="
            margin-top: 10px;
            padding: 8px 10px;
            background: ${phoneBg};
            border-radius: 4px;
            border: 1px solid #336633;
            font-size: 13px;
            color: #e0ffe0;">
            Для оплаты переведите деньги на телефон:
            <br />
            <span style="color: #ffffff; font-weight: bold; margin: 0 4px;" id="displayPhone">${hallPhone[hall]}</span>
            <button
              onclick="copyPhoneToClipboard('${hallPhone[hall]}')"
              style="
                margin-left: 6px;
                padding: 0;
                width: 20px;
                height: 20px;
                border: none;
                background: transparent;
                color: #a0e0ff;
                font-size: 15px;
                cursor: pointer;"
              title="Копировать телефон">
              📋
            </button>
          </div>
        `;
      } else {
        priceElem.style.background = '#1a4b1a';
        priceElem.style.borderColor = '#404040';
        priceElem.innerHTML = `
          Стоимость зала: ${price} ₽.<br>
          Для этого зала не производится деление на участников или участников нет.
        `;
      }

      showHistoryTable(); 

    }

    // Начать редактирование (показать инпут)
    function startEdit(index) {
      const line = document.getElementById(`playerLine${index}`);
      const span = document.querySelector(`#playerLine${index} .playerName span`);
      const input = document.getElementById(`nameEdit${index}`);

      const startIcon = document.querySelector(`span[onclick="startEdit(${index})"]`);
      const submitIcon = document.querySelector(`span[onclick="submitEdit(${index})"]`);
      const cancelIcon = document.querySelector(`span[onclick="cancelEdit(${index})"]`);

      span.style.display = 'none';
      input.style.display = 'inline-block';
      input.focus();

      startIcon.style.display = 'none';
      submitIcon.style.display = 'inline-block';
      cancelIcon.style.display = 'inline-block';
    }

  
    // Сохранить редактирование
    
    // отправить изменения на сервер
async function submitEdit(index) {
  const input = document.getElementById(`nameEdit${index}`);
  const newName = input.value.trim();
  const hall = document.getElementById('hallSelect').value;

  if (!newName) {
    alert('Пожалуйста, введите корректное ФИО');
    return;
  }

  // проверка формата ФИО: минимум 3 слова
  const parts = newName.split(/\s+/).filter(word => word.length > 0);
  if (parts.length < 3) {
    alert('ФИО должно состоять из трёх слов: Фамилия Имя Отчество');
    return;
  }

  const oldName = playersByHall[hall][index];

  if (newName === oldName) {
    cancelEdit(index);
    return;
  }

  try {
    const response = await fetch(
      'https://ball76.up.railway.app/api/player/name',
      {
        method: 'PATCH',
        headers: {

    const dayNamesRU = {
      "Monday": "понедельник",
      "Tuesday": "вторник",
      "Wednesday": "среда",
      "Thursday": "четверг",
      "Friday": "пятница",
      "Saturday": "суббота",
      "Sunday": "воскресенье"
    };

    const scheduleDefs = [
      { hall: "hall1", day: "Tuesday",  from: 21, to: 23 },
      { hall: "hall1", day: "Thursday", from: 21, to: 23 },
      { hall: "hall2", day: "Friday",   from: 21, to: 23 }
    ];

    function getDayCode(dayName) {
      const map = {
        "Monday": 1,
        "Tuesday": 2,
        "Wednesday": 3,
        "Thursday": 4,
        "Friday": 5,
        "Saturday": 6,
        "Sunday": 7
      };
      return map[dayName] || 0;
    }

    function getNearestGameDate(hall) {
      const now = new Date();
      const nowWeekDay = now.getDay() || 7;
      const nowHour = now.getHours();

      let nearest = null;

      scheduleDefs
        .filter(item => item.hall === hall)
        .forEach(item => {
          const dayCode = getDayCode(item.day);
          const dayDiff = (dayCode - nowWeekDay + 7) % 7;
          const approximateHour = item.from;
          let timeDiff = dayDiff * 24 + (approximateHour - nowHour);

          if (timeDiff < 0) {
            timeDiff += 7 * 24;
          }

          if (!nearest || timeDiff < nearest.diff) {
            nearest = {
              diff: timeDiff,
              from: item.from,
              to: item.to
            };
          }
        });

      if (!nearest) return null;

      const nearestDate = new Date(now);
      nearestDate.setDate(now.getDate() + Math.floor(nearest.diff / 24));
      nearestDate.setHours(nearest.from, 0, 0, 0);

      return nearestDate.toISOString().split('T')[0];  // YYYY-MM-DD
    }


    function getNearestGameText(hall) {
